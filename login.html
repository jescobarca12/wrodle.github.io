<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrodle ES · Entrar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>WRODLE ES</h1>
    <p class="subtitle">Adivina la palabra de 5 letras</p>
  </header>

  <main class="login-wrapper">
    <div class="login-box">

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
        <button class="auth-tab" data-tab="register">Registrarse</button>
      </div>

      <form id="form-login" class="auth-form">
        <input type="email" id="login-email" placeholder="CORREO" autocomplete="email" required />
        <input type="password" id="login-password" placeholder="CONTRASEÑA" autocomplete="current-password" required />
        <p class="login-error" id="login-error"></p>
        <button type="submit" id="btn-login">ENTRAR →</button>
      </form>

      <form id="form-register" class="auth-form hidden">
        <input type="text" id="reg-username" placeholder="NOMBRE DE USUARIO" maxlength="20" required />
        <input type="email" id="reg-email" placeholder="CORREO" autocomplete="email" required />
        <input type="password" id="reg-password" placeholder="CONTRASEÑA" autocomplete="new-password" required />
        <input type="password" id="reg-password2" placeholder="CONFIRMAR CONTRASEÑA" required />
        <p class="login-error" id="register-error"></p>
        <button type="submit" id="btn-register">CREAR CUENTA →</button>
      </form>

    </div>
  </main>

  <script type="module">
    import { login, register, isLoggedIn } from './modules/auth.js';

    isLoggedIn().then(logged => {
      if (logged) location.replace('./index.html');
    });

    const tabs = document.querySelectorAll('.auth-tab');
    const formLogin = document.getElementById('form-login');
    const formRegister = document.getElementById('form-register');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isLogin = tab.dataset.tab === 'login';
        formLogin.classList.toggle('hidden', !isLogin);
        formRegister.classList.toggle('hidden', isLogin);
      });
    });

    formLogin.addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('btn-login');
      errorEl.textContent = '';
      btn.textContent = 'Cargando...';
      btn.disabled = true;

      try {
        await login(email, password);
        location.replace('./index.html');
      } catch (err) {
        errorEl.textContent = err.message || 'Correo o contraseña incorrectos';
        btn.textContent = 'ENTRAR →';
        btn.disabled = false;
      }
    });

    formRegister.addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;
      const errorEl = document.getElementById('register-error');
      const btn = document.getElementById('btn-register');
      errorEl.textContent = '';

      if (password !== password2) {
        errorEl.textContent = 'Las contraseñas no coinciden';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres';
        return;
      }
      if (username.length < 3) {
        errorEl.textContent = 'El nombre de usuario debe tener al menos 3 caracteres';
        return;
      }

      btn.textContent = 'Creando cuenta...';
      btn.disabled = true;

      try {
        await register(username, email, password);
        errorEl.style.color = '#538d4e';
        errorEl.textContent = 'Cuenta creada. Revisa tu correo para confirmar.';
        btn.textContent = 'CREAR CUENTA →';
        btn.disabled = false;
      } catch (err) {
        errorEl.style.color = '';
        errorEl.textContent = err.message || 'Error al crear la cuenta';
        btn.textContent = 'CREAR CUENTA →';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
